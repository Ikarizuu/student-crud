<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benilde Manila - Student Directory</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* De La Salle-College of Saint Benilde Signature Color Scheme */
            --benilde-dark: #111827;       /* Deep Obsidian Gray */
            --benilde-green: #00A859;      /* Benilde Signature Emerald Green */
            --benilde-green-hover: #008f4a; /* Deep Emerald */
            --benilde-green-light: #e6f7ef; /* Ultra-soft Green Tint */
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --shadow-md: 0 10px 15px -3px rgba(0, 168, 89, 0.05), 0 4px 6px -4px rgba(0, 168, 89, 0.05);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Benilde Navbar Header Setup */
        .navbar-custom {
            background-color: var(--benilde-dark) !important;
            padding: 12px 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            border-bottom: 4px solid var(--benilde-green);
        }

        .navbar-custom .navbar-brand {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
        }

        .navbar-logo {
            height: 42px;
            width: auto;
            object-fit: contain;
            margin-right: 12px;
        }

        .navbar-brand-text {
            color: #ffffff;
        }

        .navbar-brand-subtext {
            color: var(--benilde-green);
            font-weight: 400;
            font-size: 0.85rem;
            display: block;
            letter-spacing: 0.05em;
        }

        /* Premium Benilde Cards styling */
        .custom-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 32px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 168, 89, 0.1);
            border-color: rgba(0, 168, 89, 0.2);
        }

        .card-header-title {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--benilde-dark);
            text-transform: uppercase;
            border-bottom: 2px solid var(--benilde-green);
            padding-bottom: 8px;
            display: inline-block;
        }

        /* Modernized Form Inputs */
        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        .input-group-text {
            background-color: #f9fafb;
            border: 1.5px solid var(--border-color);
            border-right: none;
            color: var(--text-muted);
            border-radius: 8px 0 0 8px;
        }

        .form-control {
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: var(--benilde-green);
            box-shadow: 0 0 0 4px rgba(0, 168, 89, 0.15);
            outline: none;
        }

        /* CSB Custom Primary Buttons */
        .btn-custom-primary {
            background-color: var(--benilde-green);
            border: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 12px 24px;
            border-radius: 8px;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .btn-custom-primary:hover {
            background-color: var(--benilde-green-hover);
            color: #ffffff;
        }

        .btn-custom-primary:active {
            transform: scale(0.98);
        }

        .btn-custom-secondary {
            background-color: #f3f4f6;
            border: 1px solid var(--border-color);
            color: #4b5563;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .btn-custom-secondary:hover {
            background-color: #e5e7eb;
            color: var(--benilde-dark);
        }

        /* Action Buttons (Table Rows) */
        .action-btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .action-btn-edit {
            background-color: #fef3c7;
            color: #d97706;
        }

        .action-btn-edit:hover {
            background-color: #fcd34d;
            transform: scale(1.05);
        }

        .action-btn-delete {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .action-btn-delete:hover {
            background-color: #fca5a5;
            transform: scale(1.05);
        }

        /* Table Aesthetics */
        .table-responsive {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            background: #ffffff;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background-color: #f9fafb;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1.5px solid var(--border-color);
            padding: 16px 20px;
        }

        .table tbody td {
            padding: 16px 20px;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        .id-badge {
            background: var(--benilde-green-light);
            color: var(--benilde-green-hover);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Custom Dynamic Alert Boxes */
        .alert-success {
            background-color: var(--benilde-green-light);
            border-color: rgba(0, 168, 89, 0.2);
            color: var(--benilde-green-hover);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Navigation Header -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-5">
        <div class="container">
            <span class="navbar-brand mb-0">
                <img src="logo.png" alt="Benilde Logo" class="navbar-logo">
                <div>
                    <span class="navbar-brand-text">College of Saint Benilde</span>
                    <span class="navbar-brand-subtext">Manila &bull; Student Directory</span>
                </div>
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            
            <!-- Left Grid Pane: Interactive Input Console -->
            <div class="col-lg-4">
                <div class="custom-card">
                    <h4 class="card-header-title mb-4" id="form-title">
                        <i class="fas fa-user-plus text-success me-2"></i>Register Student
                    </h4>

                    <!-- Dynamic Feedback Notifications -->
                    <div id="alert-box" class="alert d-none align-items-center mb-3" role="alert">
                        <i class="fas id-icon me-2"></i> <span id="alert-msg"></span>
                    </div>

                    <form id="student-form" novalidate>
                        <input type="hidden" id="student-id" value="">
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">STUDENT FULL NAME</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="name" placeholder="E.g., John Doe" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="course" class="form-label">DEGREE PROGRAM / COURSE</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-book-open"></i></span>
                                <input type="text" class="form-control" id="course" placeholder="E.g., BS Information Technology" required>
                            </div>
                        </div>

                        <div id="form-actions">
                            <button type="submit" class="btn-custom-primary"><i class="fas fa-plus-circle me-1"></i> Add Student</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right Grid Pane: Real-Time Sheets Student Directory Display -->
            <div class="col-lg-8">
                <div class="custom-card">
                    <h4 class="card-header-title mb-4">
                        <i class="fas fa-database text-success me-2"></i>Student Database
                    </h4>
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th scope="col" style="width: 15%;">ID</th>
                                    <th scope="col" style="width: 40%;">Student Name</th>
                                    <th scope="col" style="width: 30%;">Program / Course</th>
                                    <th scope="col" class="text-center" style="width: 15%;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="student-table-body">
                                <tr>
                                    <td colspan="4" class="text-center py-5 text-secondary">
                                        <div class="spinner-border text-success spinner-border-sm me-2" role="status"></div> Synching with Google Sheets...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JavaScript Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Client-Side Serverless Interactive Controller -->
    <script>
        // Set Active API Handshake Address
        const API_URL = "https://script.google.com/macros/s/AKfycbwWuiV1qxeHqCVVcuQKv3vvhTEoIB8WY36kKTNgnEiRnq4JvebRN5fJ5Xs7CYBHAu1O/exec";

        let studentsList = [];
        let alertTimeout = null;

        // Initialize Data Load Sync
        document.addEventListener("DOMContentLoaded", fetchStudents);

        async function fetchStudents() {
            try {
                const response = await fetch(`${API_URL}?action=read`);
                studentsList = await response.json();
                renderTable();
            } catch (err) {
                showAlert("danger", "Could not synchronize with Benilde Database.");
            }
        }

        function renderTable() {
            const tbody = document.getElementById("student-table-body");
            tbody.innerHTML = "";

            if (studentsList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-secondary"><i class="fas fa-info-circle me-2"></i>No registered records found in the directory.</td></tr>`;
                return;
            }

            // Display latest records first
            [...studentsList].reverse().forEach(student => {
                tbody.innerHTML += `
                    <tr>
                        <td><span class="id-badge">#${student.id}</span></td>
                        <td><strong class="fw-semibold text-dark">${student.name}</strong></td>
                        <td><span class="text-secondary fw-medium">${student.course}</span></td>
                        <td class="text-center">
                            <div class="d-inline-flex gap-2">
                                <span onclick="editStudent(${student.id})" class="action-btn action-btn-edit" title="Modify Record"><i class="fas fa-edit"></i></span>
                                <span onclick="deleteStudent(${student.id})" class="action-btn action-btn-delete" title="Remove Record"><i class="fas fa-trash-alt"></i></span>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById("student-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const id = document.getElementById("student-id").value;
            const name = document.getElementById("name").value.trim();
            const course = document.getElementById("course").value.trim();

            // Client Validation Checks
            if (!name || !course) {
                showAlert("danger", "All registration inputs are required.");
                return;
            }

            const namePattern = /^[a-zA-Z\s.]+$/;
            if (!namePattern.test(name)) {
                showAlert("danger", "Name should only contain alphabet characters, spaces, or periods.");
                return;
            }

            const payload = id 
                ? { action: "update", id: parseInt(id), name, course }
                : { action: "create", name, course };

            showAlert("info", "Processing transaction with database...");

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === "success") {
                    resetForm();
                    await fetchStudents();
                    showAlert("success", id ? "Record updated successfully!" : "Student registered successfully!");
                } else {
                    showAlert("danger", result.msg);
                }
            } catch (err) {
                showAlert("danger", "Database transaction failed. Please retry.");
            }
        });

        function editStudent(id) {
            const student = studentsList.find(s => s.id === id);
            if (!student) return;

            document.getElementById("student-id").value = student.id;
            document.getElementById("name").value = student.name;
            document.getElementById("course").value = student.course;

            document.getElementById("form-title").innerHTML = `<i class="fas fa-user-edit text-warning me-2"></i>Modify Record`;
            document.getElementById("form-actions").innerHTML = `
                <div class="d-flex gap-2">
                    <button type="submit" class="btn-custom-primary" style="background-color: #d97706;"><i class="fas fa-save me-1"></i> Save Changes</button>
                    <button type="button" onclick="resetForm()" class="btn-custom-secondary"><i class="fas fa-times-circle me-1"></i> Cancel</button>
                </div>
            `;
        }

        async function deleteStudent(id) {
            if (!confirm("Confirm deleting this student record? This action is immediate and cannot be undone.")) return;
            showAlert("info", "Deleting record...");

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "delete", id: id })
                });
                const result = await response.json();

                if (result.status === "success") {
                    resetForm();
                    await fetchStudents();
                    showAlert("success", "Student record deleted successfully!");
                } else {
                    showAlert("danger", result.msg);
                }
            } catch (err) {
                showAlert("danger", "Database was unable to delete this entry.");
            }
        }

        function resetForm() {
            document.getElementById("student-id").value = "";
            document.getElementById("name").value = "";
            document.getElementById("course").value = "";
            document.getElementById("form-title").innerHTML = `<i class="fas fa-user-plus text-success me-2"></i>Register Student`;
            document.getElementById("form-actions").innerHTML = `<button type="submit" class="btn-custom-primary"><i class="fas fa-plus-circle me-1"></i> Add Student</button>`;
        }

        // Alert Manager with 5-second Auto-Dismiss for Success
        function showAlert(type, msg) {
            const alertBox = document.getElementById("alert-box");
            const alertMsg = document.getElementById("alert-msg");
            
            if (alertTimeout) {
                clearTimeout(alertTimeout);
                alertTimeout = null;
            }

            alertBox.classList.remove("d-none", "alert-success", "alert-danger", "alert-warning", "alert-info");
            alertBox.classList.add(`alert-${type}`, "d-flex");
            alertMsg.textContent = msg;

            // Trigger timer auto-hide for success alerts only
            if (type === "success") {
                alertTimeout = setTimeout(() => {
                    alertBox.classList.remove("d-flex");
                    alertBox.classList.add("d-none");
                }, 5000); 
            }
        }
    </script>
</body>
</html>
